appId: com.bz.browser
productName: BZ Browser
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/**/*
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme,LICENSE,license}"
  - "!**/node_modules/**/{test,__tests__,tests,powered-test,example,examples,*.d.ts}"

asar: true

extraMetadata:
  main: dist-electron/electron/main.js

extraResources:
  - from: build/chromium
    to: chromium
    filter:
      - "**/*"
      - "!**/.bundle-missing"
  - from: build/icon.png
    to: logo.png
  - from: assets
    to: browser-assets

win:
  signAndEditExecutable: false
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BZ Browser
  deleteAppDataOnUninstall: false

mac:
  target:
    - dmg
  category: public.app-category.utilities
  artifactName: ${productName}-${version}-mac.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  target:
    - AppImage
    - deb
  category: Network
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  maintainer: BZ Browser
